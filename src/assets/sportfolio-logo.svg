<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" width="560" height="420">
  <defs>

    <!-- Shield fill — deep navy with subtle radial highlight -->
    <radialGradient id="shieldFill" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   style="stop-color:#0e2045"/>
      <stop offset="60%"  style="stop-color:#091628"/>
      <stop offset="100%" style="stop-color:#050e1a"/>
    </radialGradient>

    <!-- Gold gradient — rich, not flat -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#fff4b0"/>
      <stop offset="30%"  style="stop-color:#f0c84a"/>
      <stop offset="65%"  style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#8b6200"/>
    </linearGradient>

    <!-- Crimson gradient -->
    <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ff4d6a"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>

    <!-- Banner gold -->
    <linearGradient id="bannerGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#f5d060"/>
      <stop offset="50%"  style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#8b6200"/>
    </linearGradient>

    <!-- White text gradient -->
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8d8f0"/>
    </linearGradient>

    <!-- Globe blue -->
    <radialGradient id="globeBlue" cx="38%" cy="32%" r="65%">
      <stop offset="0%"  style="stop-color:#3b82f6"/>
      <stop offset="60%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </radialGradient>

    <!-- Card blue -->
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <!-- Card red -->
    <linearGradient id="cardRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <!-- Card gold -->
    <linearGradient id="cardGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>

    <!-- Outer glow on shield -->
    <filter id="shieldGlow" x="-8%" y="-6%" width="116%" height="115%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path for shield interior -->
    <clipPath id="shieldClip">
      <path d="M280 22 L490 90 L490 240 Q490 360 280 405 Q70 360 70 240 L70 90 Z"/>
    </clipPath>

  </defs>

  <!-- Dark background -->
  <rect width="560" height="420" fill="#0a0d14" rx="20"/>

  <!-- ═══ OUTER GLOW HALO ═══ -->
  <path d="M280 22 L490 90 L490 240 Q490 360 280 405 Q70 360 70 240 L70 90 Z"
        fill="none" stroke="#d4a017" stroke-width="22" opacity="0.08" filter="url(#shieldGlow)"/>

  <!-- ═══ SHIELD SHAPE — 3 layers ═══ -->
  <!-- Shadow layer -->
  <path d="M280 26 L488 93 L488 241 Q488 358 280 402 Q72 358 72 241 L72 93 Z"
        fill="#020810" opacity="0.6" transform="translate(4,5)"/>
  <!-- Main shield body -->
  <path d="M280 22 L490 90 L490 240 Q490 360 280 405 Q70 360 70 240 L70 90 Z"
        fill="url(#shieldFill)"/>
  <!-- Gold border — thick outer -->
  <path d="M280 22 L490 90 L490 240 Q490 360 280 405 Q70 360 70 240 L70 90 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="5"/>
  <!-- Gold border — thin inner -->
  <path d="M280 38 L476 100 L476 242 Q476 348 280 389 Q84 348 84 242 L84 100 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.4"/>

  <!-- ═══ SHIELD INTERIOR CONTENT (clipped) ═══ -->
  <g clip-path="url(#shieldClip)">

    <!-- Diagonal stripe texture -->
    <g opacity="0.04">
      <line x1="70" y1="22"  x2="490" y2="422" stroke="#fff" stroke-width="18"/>
      <line x1="20" y1="22"  x2="440" y2="422" stroke="#fff" stroke-width="18"/>
      <line x1="120" y1="22" x2="540" y2="422" stroke="#fff" stroke-width="18"/>
      <line x1="-30" y1="22" x2="390" y2="422" stroke="#fff" stroke-width="18"/>
      <line x1="170" y1="22" x2="590" y2="422" stroke="#fff" stroke-width="18"/>
    </g>

    <!-- Globe behind cards -->
    <circle cx="280" cy="175" r="105" fill="url(#globeBlue)" opacity="0.35"/>
    <!-- Globe grid lines -->
    <ellipse cx="280" cy="175" rx="105" ry="42" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="280" cy="175" rx="105" ry="78" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.15"/>
    <line x1="175" y1="175" x2="385" y2="175" stroke="#93c5fd" stroke-width="0.8" opacity="0.2"/>
    <line x1="280" y1="70" x2="280" y2="280" stroke="#93c5fd" stroke-width="0.8" opacity="0.2"/>
    <!-- Crimson vertical stripe dividing shield halves -->
    <rect x="269" y="22" width="22" height="385" fill="url(#crimsonGrad)" opacity="0.06"/>

  </g>

  <!-- ═══ FANNED SPORTS CARDS ═══ -->
  <!-- Left card (blue, rotated left) -->
  <g transform="rotate(-18, 280, 240)" filter="url(#softGlow)">
    <rect x="200" y="100" width="64" height="92" rx="7" fill="url(#cardBlue)" stroke="#fff" stroke-width="1.2" opacity="0.9"/>
    <text x="232" y="155" font-size="28" text-anchor="middle">⚽</text>
    <rect x="204" y="178" width="56" height="10" rx="3" fill="#1e3a8a" opacity="0.6"/>
  </g>
  <!-- Right card (red, rotated right) -->
  <g transform="rotate(18, 280, 240)" filter="url(#softGlow)">
    <rect x="296" y="100" width="64" height="92" rx="7" fill="url(#cardRed)" stroke="#fff" stroke-width="1.2" opacity="0.9"/>
    <text x="328" y="155" font-size="28" text-anchor="middle">🏀</text>
    <rect x="300" y="178" width="56" height="10" rx="3" fill="#7f1d1d" opacity="0.6"/>
  </g>
  <!-- Far left card (smaller, more rotated) -->
  <g transform="rotate(-32, 280, 240)" filter="url(#softGlow)">
    <rect x="148" y="112" width="56" height="80" rx="6" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1" opacity="0.7"/>
    <text x="176" y="158" font-size="22" text-anchor="middle">🏈</text>
  </g>
  <!-- Far right card (smaller, more rotated) -->
  <g transform="rotate(32, 280, 240)" filter="url(#softGlow)">
    <rect x="356" y="112" width="56" height="80" rx="6" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1" opacity="0.7"/>
    <text x="384" y="158" font-size="22" text-anchor="middle">⚾</text>
  </g>
  <!-- Center card (gold, front, no rotation) -->
  <g filter="url(#goldGlow)">
    <rect x="242" y="88" width="76" height="108" rx="8" fill="url(#cardGold)" stroke="#fff" stroke-width="2"/>
    <!-- Athlete silhouette on center card -->
    <circle cx="280" cy="118" r="10" fill="#1e3a8a" opacity="0.85"/>
    <line x1="280" y1="128" x2="280" y2="155" stroke="#1e3a8a" stroke-width="5" stroke-linecap="round"/>
    <line x1="280" y1="138" x2="266" y2="150" stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="280" y1="138" x2="294" y2="150" stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="277" y1="155" x2="270" y2="172" stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="283" y1="155" x2="290" y2="172" stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Gold star on center card -->
    <polygon points="280,176 282,182 288,182 283,186 285,192 280,188 275,192 277,186 272,182 278,182"
             fill="#1e3a8a" opacity="0.6"/>
    <rect x="248" y="193" width="64" height="0" rx="0"/>
  </g>

  <!-- ═══ SHIELD DIVIDING LINE (horizontal, below cards) ═══ -->
  <line x1="100" y1="210" x2="460" y2="210" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "SPORTFOLIO" -->
  <text x="280" y="268"
        font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
        font-size="52" font-weight="900" letter-spacing="3"
        text-anchor="middle"
        stroke="#060e1c" stroke-width="6" paint-order="stroke"
        fill="url(#whiteGrad)"
        filter="url(#textGlow)">SPORTFOLIO</text>

  <!-- ═══ BANNER RIBBON ═══ -->
  <!-- Left tail -->
  <polygon points="108,296 124,283 124,309" fill="#8b6200"/>
  <!-- Right tail -->
  <polygon points="452,296 436,283 436,309" fill="#8b6200"/>
  <!-- Banner body -->
  <rect x="120" y="280" width="320" height="32" rx="3" fill="url(#bannerGold)"/>
  <!-- Banner inner shadow top -->
  <rect x="120" y="280" width="320" height="6" rx="3" fill="#fff4b0" opacity="0.2"/>
  <!-- Banner inner shadow bottom -->
  <rect x="120" y="306" width="320" height="6" rx="3" fill="#5a3800" opacity="0.3"/>
  <!-- Stars on banner -->
  <polygon points="144,296 146,291 148,296 143,293 149,293" fill="#8b6200" opacity="0.8"/>
  <polygon points="416,296 418,291 420,296 415,293 421,293" fill="#8b6200" opacity="0.8"/>
  <!-- "CARDS" text on banner -->
  <text x="280" y="302"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="20" font-weight="900" letter-spacing="6"
        text-anchor="middle"
        fill="#0a1628"
        stroke="#8b6200" stroke-width="0.5" paint-order="stroke">CARDS</text>

  <!-- ═══ TOP STAR ARC ═══ -->
  <!-- Large center gold star -->
  <polygon points="280,28 285,44 302,44 288,54 294,70 280,60 266,70 272,54 258,44 275,44"
           fill="url(#goldGrad)" filter="url(#goldGlow)" opacity="0.95"/>
  <!-- Arc of smaller stars -->
  <g fill="#d4a017" opacity="0.75" filter="url(#softGlow)">
    <!-- Left arc -->
    <polygon points="194,52 196,46 198,52 193,49 199,49" transform="rotate(-25,196,49)"/>
    <polygon points="152,80 154,74 156,80 151,77 157,77" transform="rotate(-40,154,77)"/>
    <!-- Right arc -->
    <polygon points="362,52 364,46 366,52 361,49 367,49" transform="rotate(25,364,49)"/>
    <polygon points="404,80 406,74 408,80 403,77 409,77" transform="rotate(40,406,77)"/>
  </g>

  <!-- ═══ GOLD SHIELD PIN DOTS (top corners of shield) ═══ -->
  <circle cx="280" cy="22" r="5" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="490" cy="90" r="5" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="70"  cy="90" r="5" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- ═══ BOTTOM CREDIT ═══ -->
  <text x="280" y="395"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="600" letter-spacing="3"
        text-anchor="middle" fill="#d4a017" opacity="0.45">A KINISIS LABS PRODUCT</text>

</svg>
